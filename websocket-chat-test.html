<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>WebSocket 私聊测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        #chat { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        #msgInput { width: 70%; }
        #sendBtn { width: 20%; }
        .msg-self { color: #1976d2; }
        .msg-other { color: #388e3c; }
        .msg-system { color: #888; font-style: italic; }
    </style>
</head>
<body>
<h2>WebSocket 私聊测试</h2>
<div>
    <label>Token: <input type="text" id="token" style="width:300px"></label>
    <label>对方用户ID: <input type="number" id="withUserId" value="2"></label>
    <button id="connectBtn">连接</button>
    <button id="disconnectBtn" disabled>断开</button>
</div>
<div id="chat"></div>
<div>
    <input type="text" id="msgInput" placeholder="输入消息...">
    <button id="sendBtn" disabled>发送</button>
    <button id="readBtn" disabled>已读</button>
    <button id="historyBtn" disabled>历史消息</button>
</div>
<script>
let ws = null;
let withUserId = null;
let token = null;
let clientMsgIdSeed = 1;
let heartbeatTimer = null;
let lastServerMsgId = null; // 记录最后收到的 serverMsgId
let historyBeforeId = null; // 用于历史消息翻页

function logMsg(msg, type = 'system') {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg-' + type;
    div.textContent = msg;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

document.getElementById('connectBtn').onclick = function() {
    token = document.getElementById('token').value.trim();
    withUserId = document.getElementById('withUserId').value;
    if (!token || !withUserId) {
        alert('请填写 token 和对方用户ID');
        return;
    }
    // WebSocket地址
    const wsUrl = `ws://localhost:8080/ws/chat?token=${encodeURIComponent(token)}`;
    ws = new WebSocket(wsUrl);
    ws.onopen = function() {
        logMsg('已连接WebSocket', 'system');
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('disconnectBtn').disabled = false;
        document.getElementById('connectBtn').disabled = true;
        document.getElementById('readBtn').disabled = false;
        document.getElementById('historyBtn').disabled = false;
        // 启动心跳定时器，每30秒发送一次ping
        heartbeatTimer = setInterval(function() {
            if (ws && ws.readyState === 1) {
                ws.send(JSON.stringify({type: 'ping'}));
                logMsg('发送心跳', 'system');
            }
        }, 30000);
        historyBeforeId = null;
    };
    ws.onmessage = function(e) {
        try {
            const msg = JSON.parse(e.data);
            if (msg.type === 'chat' && msg.data) {
                const data = msg.data;
                logMsg(`[${data.fromUserId}] ${data.content}`, data.fromUserId == withUserId ? 'other' : 'self');
                // 记录 serverMsgId 并自动发送 ack
                if (typeof data.serverMsgId !== 'undefined') {
                    lastServerMsgId = data.serverMsgId;
                    // 自动发送接收确认（chat_recv_ack）
                    ws.send(JSON.stringify({
                        type: 'chat_recv_ack',
                        data: { serverMsgId: data.serverMsgId }
                    }));
                    logMsg('已发送 chat_recv_ack', 'system');
                }
            } else if (msg.type === 'chat_send_ack' && msg.data) {
                const ack = msg.data;
                logMsg(`发送回执: clientMsgId=${ack.clientMsgId}, serverMsgId=${ack.serverMsgId}, delivered=${ack.delivered}`, 'system');
            } else if (msg.type === 'pong') {
                logMsg('收到心跳响应', 'system');
            } else if (msg.type === 'error') {
                logMsg('错误: ' + msg.data, 'system');
            } else {
                logMsg('收到: ' + e.data, 'system');
            }
        } catch {
            logMsg(e.data, 'system');
        }
    };
    ws.onclose = function() {
        logMsg('WebSocket已断开', 'system');
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('disconnectBtn').disabled = true;
        document.getElementById('connectBtn').disabled = false;
        document.getElementById('readBtn').disabled = true;
        document.getElementById('historyBtn').disabled = true;
        if (heartbeatTimer) {
            clearInterval(heartbeatTimer);
            heartbeatTimer = null;
        }
    };
    ws.onerror = function() {
        logMsg('WebSocket发生错误', 'system');
    };
};

document.getElementById('disconnectBtn').onclick = function() {
    if (ws) ws.close();
    if (heartbeatTimer) {
        clearInterval(heartbeatTimer);
        heartbeatTimer = null;
    }
    document.getElementById('readBtn').disabled = true;
    document.getElementById('historyBtn').disabled = true;
};

// 不再用自增种子，改为全局唯一id
function genClientMsgId() {
    // 使用当前用户id+时间戳+4位随机数，避免重复
    return `${withUserId}_${Date.now()}_${Math.floor(Math.random()*10000)}`;
}

document.getElementById('sendBtn').onclick = function() {
    const msg = document.getElementById('msgInput').value;
    if (!msg) return;
    if (!ws || ws.readyState !== 1) {
        logMsg('WebSocket未连接', 'system');
        return;
    }
    // 新协议格式，clientMsgId唯一
    const payload = {
        type: 'chat',
        data: {
            clientMsgId: genClientMsgId(),
            toUserId: Number(withUserId),
            content: msg
        }
    };
    ws.send(JSON.stringify(payload));
    logMsg(`[我] ${msg}`, 'self');
    document.getElementById('msgInput').value = '';
};

// 已读按钮事件
document.getElementById('readBtn').onclick = function() {
    if (!ws || ws.readyState !== 1) {
        logMsg('WebSocket未连接', 'system');
        return;
    }
    if (!lastServerMsgId) {
        logMsg('没有可标记已读的消息', 'system');
        return;
    }
    // 发送已读消息
    ws.send(JSON.stringify({
        type: 'read',
        data: {
            withUserId: Number(withUserId),
            upToMsgId: lastServerMsgId
        }
    }));
    logMsg(`已发送已读 upToMsgId=${lastServerMsgId}`, 'system');
};

// 拉取历史消息按钮事件
// 需后端接口 /graduation-project/interact/chat/history?withUserId=xxx&beforeId=xxx&pageSize=20

document.getElementById('historyBtn').onclick = async function() {
    if (!token || !withUserId) {
        logMsg('请先连接并填写token/对方ID', 'system');
        return;
    }
    let url = `http://localhost:8080/graduation-project/interact/chat/history?withUserId=${withUserId}`;
    if (historyBeforeId) url += `&beforeId=${historyBeforeId}`;
    url += `&pageSize=20`;
    try {
        const resp = await fetch(url, {
            method: 'GET',
            credentials : "include",
            headers: {
                'token': token
            }
        });
        const data = await resp.json();
        if (data.code === 0 && Array.isArray(data.data)) {
            if (data.data.length === 0) {
                logMsg('没有更多历史消息', 'system');
                return;
            }
            for (const msg of data.data) {
                logMsg(`[历史][${msg.fromUserId}] ${msg.content} (id:${msg.id})`, msg.fromUserId == withUserId ? 'other' : 'self');
            }
            // 更新游标
            historyBeforeId = data.data[data.data.length - 1].id;
        } else {
            logMsg('历史消息拉取失败: ' + (data.msg || JSON.stringify(data)), 'system');
        }
    } catch (e) {
        logMsg('历史消息接口异常: ' + e, 'system');
    }
};

document.getElementById('msgInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        document.getElementById('sendBtn').click();
    }
});
</script>
</body>
</html>
