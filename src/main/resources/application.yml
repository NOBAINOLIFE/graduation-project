server:
  port: 8080

spring:
  application:
    name: graduation-project

  servlet:
    multipart:
      # 允许单个分片的最大值，设置为 10MB 足够容纳 5MB 的数据 + 报文头
      max-file-size: 10MB
      # 整个请求的最大值，分片上传通常一个请求只传一个片，所以也设为 10MB
      max-request-size: 10MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/graduation-project
    username: root
    password: 12120605

  redis:
    host: 127.0.0.1
    port: 6379
    password: 12120605
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
    database: 0

  kafka:
    bootstrap-servers: 127.0.0.1:9092
    consumer:
      group-id: graduation-project
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.syt.graduationproject.model.*,com.syt.graduationproject.model.kafka.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 3


  elasticsearch:
    uris: http://127.0.0.1:9200

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

minio:
  endpoint: http://127.0.0.1:9000
  accessKey: admin
  secretKey: 12120605
  bucketName: graduation-project

search:
  es:
    # 修改分词器或 mapping 后，可临时改为 true 触发删除重建并全量回灌，完成后建议改回 false
    rebuild-on-startup: false
