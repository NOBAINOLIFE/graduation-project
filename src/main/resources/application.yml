server:
  port: 8080

spring:
  application:
    name: experiment-4

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/graduation-project
    username: root
    password: 12120605

  redis:
    host: 127.0.0.1
    port: 6379
    password: 12120605
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
    database: 0

  kafka:
    bootstrap-servers: 127.0.0.1:9092
    consumer:
      group-id: graduation-project
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.syt.graduationproject.model.*,com.syt.graduationproject.model.kafka.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 3


  elasticsearch:
    uris: http://127.0.0.1:9200

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

minio:
  endpoint: http://127.0.0.1:9000
  accessKey: admin
  secretKey: 12120605
  bucketName: graduation-project